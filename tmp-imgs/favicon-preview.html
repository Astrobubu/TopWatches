<!DOCTYPE html>
<html>
<head><title>Favicon Preview</title></head>
<body style="background:#1a1a2e; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; gap:40px; flex-wrap:wrap;">

  <!-- 16x16 -->
  <div style="text-align:center;">
    <div style="width:16px;height:16px;background:#0D0D12;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid #C9A84C;margin:0 auto 8px;">
      <span style="color:#C9A84C;font-size:10px;font-weight:700;font-family:Georgia,serif;line-height:1;">G</span>
    </div>
    <span style="color:#666;font-size:10px;font-family:sans-serif;">16px</span>
  </div>

  <!-- 32x32 -->
  <div style="text-align:center;">
    <div style="width:32px;height:32px;background:#0D0D12;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #C9A84C;margin:0 auto 8px;">
      <span style="color:#C9A84C;font-size:20px;font-weight:700;font-family:Georgia,serif;line-height:1;margin-top:1px;">G</span>
    </div>
    <span style="color:#666;font-size:10px;font-family:sans-serif;">32px (favicon)</span>
  </div>

  <!-- 64x64 -->
  <div style="text-align:center;">
    <div style="width:64px;height:64px;background:#0D0D12;border-radius:50%;display:flex;align-items:center;justify-content:center;border:4px solid #C9A84C;margin:0 auto 8px;">
      <span style="color:#C9A84C;font-size:40px;font-weight:700;font-family:Georgia,serif;line-height:1;margin-top:2px;">G</span>
    </div>
    <span style="color:#666;font-size:10px;font-family:sans-serif;">64px</span>
  </div>

  <!-- 180x180 apple -->
  <div style="text-align:center;">
    <div style="width:180px;height:180px;background:#0D0D12;border-radius:50%;display:flex;align-items:center;justify-content:center;border:6px solid #C9A84C;margin:0 auto 8px;">
      <span style="color:#C9A84C;font-size:110px;font-weight:700;font-family:Georgia,serif;line-height:1;margin-top:4px;">G</span>
    </div>
    <span style="color:#666;font-size:10px;font-family:sans-serif;">180px (Apple)</span>
  </div>

</body>
</html>
